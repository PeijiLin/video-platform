spring:
  application:
    name: user-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:192.168.220.138:8848}
        group: DEFAULT_GROUP
        namespace: video
      config:
        server-addr: 192.168.220.138:8848
        file-extension: yaml
        group: DEFAULT_GROUP
        namespace: video
        timeout: 3000
        refresh-enabled: true
        encode: UTF-8
        enabled: true
        enable-remote-sync-config: true

  config:
    import:
      - optional:nacos:mybatis-plus?refreshEnabled=true?group=DEFAULT_GROUP&namespace=video
      - optional:nacos:user?refreshEnabled=true?group=DEFAULT_GROUP&namespace=video

server:
  port: 7000

# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.lpjpro
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn


