server:
  port: 11000
spring:
  application:
    name: data-processing-service
  config:
    import:
      - optional:nacos:data-processing?refreshEnabled=true?group=DEFAULT_GROUP&namespace=video
      - optional:nacos:mybatis-plus?refreshEnabled=true?group=DEFAULT_GROUP&namespace=video
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.220.138:8848
        group: DEFAULT_GROUP
        namespace: video
      config:
        server-addr: 192.168.220.138:8848
        file-extension: yaml
        group: DEFAULT_GROUP
        namespace: video
        timeout: 3000
        refresh-enabled: true
        encode: UTF-8
        enabled: true
        enable-remote-sync-config: true
